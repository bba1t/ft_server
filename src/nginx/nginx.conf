# HTTP сервер
server {
    listen 80;
    listen [::]:80;           # IPv6
    server_name _;            # Все имена хостов

    root /var/www;
    index index.php index.html index.htm;


    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # Если index.php/index.html - показываем его вместо автоиндекса
        try_files $uri $uri/ =404;
    }
    
    # Обработка php файлов
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php7.3-fpm.sock;
        include fastcgi_params;
    }

    # Метрики nginx через встроенный для этого url
    location /stub_status {
        stub_status on;          # Включение сбора статистики
        access_log off;          # Отключаем логи
        allow 127.0.0.1;         # Разрешению запрос только через localhost
        allow 172.0.0.0/8;       # и внутри общей docker сети
        deny all;                # Запрещаю все остальное
    }
    
    # Метрики php-fmp через включенный url
    location ~ ^/(status)$ {
        access_log off;                   # Отключаем логи
        allow 127.0.0.1;                  # Разрешаем localhost
        allow 172.0.0.0/8;                # Разрешаем Docker network
        deny all;                         # Запрещаем все остальное
        include fastcgi_params;           # Подключаем FastCGI параметры
        fastcgi_pass unix:/var/run/php/php7.3-fpm.sock;  # Подключаемся к PHP-FPM
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}