apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: ''                      # Дашборды в корневой папке
    type: file
    disableDeletion: false          # Разрешаю удаление дашбордов
    updateIntervalSeconds: 10       # Как часто проверять обновления файлов
    allowUiUpdates: true            # Разрешаем редактирование в UI
    options:
      path: /etc/grafana/provisioning/dashboards  # Путь к дашбордам